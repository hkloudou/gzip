name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Unit tests + real-zlib byte-for-byte cross-checks. The C reference is the
  # gzip_ref referee subprocess, built from the OFFICIAL zlib 1.3.1 tarball
  # (pinned SHA-256 in the Makefile) — this repository contains no zlib C
  # code and no cgo. Covers levels 0-9 × flush types, golden vectors,
  # streaming call sequences and streaming-output/HTTP tests, Writer
  # behavior, all header parameters × real deflateSetHeader (deterministic
  # matrix + seeded random fuzz), and the sync.Pool adversarial tests.
  # On windows the referee legs skip; the pure Go legs are identical anyway.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referee (official zlib 1.3.1, pinned SHA-256)
        if: runner.os != 'Windows'
        run: make native-build && ./bin/gzip_ref version
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -v ./...

  # Cross-check matrix: real zlib vs pure Go, byte-for-byte. Three referee
  # builds — from the official 1.3.1 tarball (the deterministic correct
  # answer, independent of this repository), from the official 1.3.2 tarball
  # (the newest release), and against the system zlib (on macOS that is
  # Apple's libz, re-verifying Apple-platform compatibility every run).
  # Runs on x86-64, arm64 (real hardware, not just cross-compilation) and
  # macOS. Matrix: 8 corpora × 11 levels × flush positions + streaming call
  # sequences + MTIME × OS dimensions + all header parameters + empty input.
  native:
    name: cross-check matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referees (official 1.3.1 + 1.3.2 tarballs + system zlib)
        run: |
          make native-build native-build-132
          ./bin/gzip_ref version && ./bin/gzip_ref_132 version && ./bin/gzip_ref_system version
      - name: byte cross-check (official 1.3.1 + 1.3.2 + system referees vs pure Go)
        run: go run ./cmd/crossnative -mode check -native ./bin/gzip_ref,./bin/gzip_ref_132,./bin/gzip_ref_system

  # Full test suite under the Go race detector — dedicated coverage for the
  # sync.Pool adversarial tests (concurrent cross-contamination, scratch
  # aliasing, chunk-boundary stress, Writer reuse). The referee is built so
  # the C-comparison legs run under race too. Also runs on arm64: its weaker
  # memory ordering surfaces synchronization bugs x86's TSO can hide.
  race:
    name: race detector (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referee
        run: make native-build
      - name: go test -race
        env:
          ZLIB_FUZZ_ITER: "50"
        run: go test -race -count=1 ./...

  # Memory safety net: ASan/LSan over every referee mode (compress/stream/
  # header/bench) with parameter edge cases, for both official zlib builds
  # (1.3.1 + 1.3.2) — the whole C surface this repository executes.
  sanitize:
    name: ASan/LSan referee sweep
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: ASan/LSan sweep
        run: make asan-check

  # Randomized fuzz cross-check: real zlib vs pure Go, byte-for-byte
  fuzz:
    name: randomized fuzz cross-check (500 cases)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referee
        run: make native-build
      - name: fuzz cross-check
        env:
          ZLIB_FUZZ_ITER: "500"
          ZLIB_FUZZ_MAXSIZE: "1048576"
        run: go test . -run TestCrossCheckFuzz -timeout 2400s -v

  # Four-way benchmark: C++ zlib 1.3.1 / C++ zlib 1.3.2 / pure Go / std Go
  # (with memory stats). On PRs the table goes to the job summary; on push to
  # main it is written back into the README and committed. The run is pinned
  # to the triggering commit (checkout defaults to github.sha); it only runs
  # when test+native are all green (no tables for failing commits).
  bench:
    name: benchmark native/pure Go/std Go
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [test, native]
    # Serialize bench runs per ref so concurrent README commits to main don't conflict
    concurrency:
      group: bench-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referees (official zlib 1.3.1 + 1.3.2)
        run: make native-build native-build-132
      - name: run benchmarks
        run: |
          go run ./cmd/crossnative -mode bench -native ./bin/gzip_ref,./bin/gzip_ref_132 -benchtime 2s -out bench.md
          echo "## Benchmark" >> "$GITHUB_STEP_SUMMARY"
          cat bench.md >> "$GITHUB_STEP_SUMMARY"
          echo "## Code size" >> "$GITHUB_STEP_SUMMARY"
          go run ./cmd/crossnative -mode loc >> "$GITHUB_STEP_SUMMARY"
      - name: commit README (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ok=0
          for i in 1 2 3; do
            # Each attempt re-patches the tables on top of the latest main
            # (patch mode reuses bench.md, no benchmark re-run) — no rebase,
            # so no half-finished conflict state is left behind
            git fetch origin main
            git checkout -B main origin/main
            go run ./cmd/crossnative -mode patch -from bench.md -update-readme README.md
            go run ./cmd/crossnative -mode loc -update-readme README.md
            git add README.md
            if git diff --cached --quiet; then
              echo "README unchanged"; ok=1; break
            fi
            git commit -m "docs: auto-update benchmark & LOC tables [skip ci]"
            if git push origin main; then ok=1; break; fi
            echo "push failed (attempt $i), retrying..."
          done
          if [ "$ok" != "1" ]; then
            echo "::error::failed to push README benchmark tables"
            exit 1
          fi

  # Same four-way benchmark on a free arm64 runner (real Cobalt/Graviton
  # class hardware): summary-only — the committed README table stays the
  # amd64 one, this job exists to steer arm64-targeted optimization work
  # and to catch arm64 performance regressions.
  bench-arm64:
    name: benchmark arm64 (summary only)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    needs: [test, native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: build referees (official zlib 1.3.1 + 1.3.2)
        run: make native-build native-build-132
      - name: run benchmarks
        run: |
          go run ./cmd/crossnative -mode bench -native ./bin/gzip_ref,./bin/gzip_ref_132 -benchtime 2s -out bench-arm64.md
          echo "## Benchmark (arm64)" >> "$GITHUB_STEP_SUMMARY"
          cat bench-arm64.md >> "$GITHUB_STEP_SUMMARY"

  # Cross-platform compilability of the pure Go product
  cross-build:
    name: cross build (pure Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: cross build
        run: |
          for t in linux/arm64 windows/amd64 darwin/arm64 js/wasm; do
            echo "== $t =="
            GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0 go build ./...
          done
